########################################
# MOTOR DO EIXO X
########################################
[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1

# step_pin: P0.22
# dir_pin: !P2.11
# enable_pin: !P0.21

microsteps: 64
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 40.03
endstop_pin:  !P1.29
position_endstop: 351
position_max: 351
position_min: 0
homing_speed: 80
homing_retract_dist: 0 # Faz o segundo "bump" no homming. Para o sensorless homming, não deve haver segundo bump, logo, 0


########################################
# MOTOR DO EIXO Y
########################################
[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8

# step_pin: P2.13
# dir_pin: P0.11
# enable_pin: !P2.12

microsteps: 64
full_steps_per_rotation: 200
rotation_distance: 39.97
endstop_pin: !P1.28
position_endstop: 350
position_max: 350
position_min: -8
homing_speed: 80
homing_retract_dist: 0



########################################
# MOTOR DO EIXO Z0 - FRENTE/ESQUERDA - EIXO Y MKS GEN 1.4
########################################
[stepper_z]
enable_pin: !mks_gen: PF2 # D56
step_pin: mks_gen: PF6 # D60
dir_pin: mks_gen: PF7 # D61

microsteps: 8
full_steps_per_rotation: 200
rotation_distance: 8

# endstop_pin: EBBCan: PB8
endstop_pin: probe:z_virtual_endstop
# position_endstop: 0
position_max: 240
position_min: -7
homing_speed: 30
homing_retract_dist: 0 # Faz o segundo "bump" no homming. Para o sensorless homming, não deve haver segundo bump, logo, 0


########################################
# MOTOR DO EIXO Z1 - TRAZEIRO/ESQUERDO - EIXO X MKS GEN 1.4
########################################

[stepper_z1]
enable_pin: !mks_gen: PD7 # D38
step_pin: mks_gen: PF0 # D54
dir_pin: !mks_gen: PF1 # D55

microsteps: 8
full_steps_per_rotation: 200
rotation_distance: 8



########################################
# MOTOR DO EIXO Z2 - TRAZEIRO/DIREITO - EIXO Z MKS GEN 1.4
########################################
[stepper_z2]
enable_pin: !mks_gen: PK0 # D62
step_pin: mks_gen: PL3 # D46
dir_pin: mks_gen: PL1 # D48

microsteps: 8
full_steps_per_rotation: 200
rotation_distance: 8



########################################
# MOTOR DO EIXO Z3 - FRENTE/DIREITA - EIXO E0 MKS GEN 1.4
########################################
[stepper_z3]
enable_pin: !mks_gen: PA2 # D24
step_pin: mks_gen: PA4 # D26
dir_pin: !mks_gen: PA6 # D28

microsteps: 8
full_steps_per_rotation: 200
rotation_distance: 8


